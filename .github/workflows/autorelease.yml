name: Auto Release

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  autorelease:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install mise
        uses: jdx/mise-action@v2
      - name: Install
        run: mise run install
      - name: Codegen
        run: mise run codegen
      - name: PR if Difference
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git checkout -b auto-codegen-${GITHUB_SHA}
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "chore: auto codegen"
            git push origin auto-codegen-${GITHUB_SHA} || true
            gh pr create --title "chore: auto codegen" --body "Auto codegen PR" --head auto-codegen-${GITHUB_SHA} || true
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: CI
        run: mise run ci
      - name: Release
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
        run: gh release create ${{ github.ref_name }} --generate-notes || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Artifacts
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/
            build/
            out/
