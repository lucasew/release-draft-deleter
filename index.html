<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub release draft deleter</title>
<style>
body, #container {
    width: 100vw;
    height: 100vh;
    margin: 0;
    padding: 0;

    display: flex;
    align-items: center;
    flex-direction: column;
}
#container {
    display: flex;
    align-items: center;
    flex-direction: column;
    justify-content: space-around;
    max-width: min(80vw, 600px);
}

#inner-container {
    display: flex;
    align-items: center;
    flex-direction: column;
}

input, button {
    width: min(60vw, 500px);
    border: 1px grey solid;
    border-radius: 10px;
    padding: 10px;
    margin: 5px;
    box-sizing: border-box;
}

button:hover {
    background-color: gray;
    color: white;
}
p {
    text-align: justify;
}

h1 {
    text-align: center;
}

#log {
    overflow-y: scroll;
    width: 100vw;
}

::-webkit-input-placeholer, :-moz-placeholder, input {
    text-align: center;
}


</style>
</head>
<body>
    <div id="container">
        <h1>GitHub release draft deleter</h1>
        <div>
            <p>If you are lazy like me you can use query strings to pre-fill the elements like user, repo and token.</p>
            <p>All the data is processed locally. The only communication is with GitHub API.</p>
        </div>
        <!-- <h1>Token</h1> -->
        <div id="inner-container">
            <input id="token" placeholder="Token" type="text"/> 
            <!-- <h1>User</h1> -->
            <input id="user" placeholder="User" type="text" />
            <!-- <h1>Repository</h1> -->
            <input id="repo" placeholder="Repository" type="text" />
        </div>
        <br>
        <button id="start" hidden="true">Start</button>
        <div id="log"></div>
    </div>
    <script>
    /**
     * Bootstraps the form state by hydrating input fields from URL search parameters.
     * This enables sharing pre-filled URLs (e.g., `?user=foo&repo=bar`) to bypass manual entry.
     * Modifies the DOM synchronously during script execution.
     */
    (function() {
        let url = new URL(window.location.href)
        document.getElementById("token").value = url.searchParams.get("token")
        document.getElementById("user").value = url.searchParams.get("user")
        document.getElementById("repo").value = url.searchParams.get("repo")
    })()

    /**
     * Fetches all releases for the target repository via the GitHub REST API.
     * Requires a GitHub Personal Access Token with at least read access to repository contents.
     * Will interrupt the flow with a blocking `alert` if any required form field is empty.
     *
     * @returns {Promise<Array<Object>|void>} The parsed JSON response array from GitHub, or void if validation fails.
     */
    async function listReleases() {
        const token = document.getElementById("token").value.trim()
        const user = document.getElementById("user").value.trim()
        const repo = document.getElementById("repo").value.trim()
        if (token.length === 0) {
            return alert("Token not specified")
        }
        if (user.length === 0) {
            return alert("User not specified")
        }
        if (repo.length === 0) {
            return alert("Repository not specified")
        }
        const url = `https://api.github.com/repos/${user}/${repo}/releases`
        const results = await fetch(url, {
            headers: {
                "accept": "application/vnd.github.v3+json",
                "authorization": `token ${token}`
            }
        })
        console.log(url)
        return await results.json()
    }

    /**
     * Appends a real-time status tracker to the DOM for a given asynchronous operation.
     * Mutates the `#log` container to indicate "WIP", updating to "OK" or "ERR" upon resolution.
     * This acts as the primary user-facing feedback mechanism for background network requests.
     *
     * @param {Promise} promise - The pending operation to track.
     * @param {string} description - Human-readable label for the operation (e.g., "Delete 'v1.0.0'").
     */
    function logPromise(promise, description) {
        const statusMsg = document.createElement("p")
        document.getElementById("log").appendChild(statusMsg)
        statusMsg.textContent = `WIP: ${description}`
        promise
        .then((msg) => {
            statusMsg.textContent = `${description} - OK ${msg}`
        })
        .catch((err) => {
            statusMsg.textContent = `${description} - ERR ${err.message || err}`
        })
    }

    /**
     * Orchestrates the deletion workflow: fetches all releases, isolates drafts,
     * and dispatches parallel deletion requests for each draft found.
     * Automatically triggers a fake error log if no drafts exist to provide visible feedback.
     *
     * @param {Event} e - The form submission or click event.
     */
    async function handleSubmit(e) {
        e.preventDefault()
        const releases = await listReleases()
        const drafts = releases.filter((v) => v.draft)
        console.log(drafts)
        if (drafts.length === 0) {
            logPromise(Promise.reject("No draft to delete or invalid token"), "")
        }
        drafts.forEach((draft) => {
            logPromise(handleDraftDelete(draft), `Delete '${draft.name}' (${draft.html_url})`)
        })
    }

    /**
     * Executes the destructive HTTP DELETE request against the GitHub API for a single draft.
     * Requires the `repo` scope on the provided Personal Access Token to authorize the deletion.
     * Guards against accidental deletion of published releases via an explicit draft check.
     *
     * @param {Object} release - The GitHub release object payload.
     * @returns {Promise<string>} The HTTP status code and text indicating outcome.
     * @throws {string} If the passed release is not explicitly marked as a draft.
     */
    async function handleDraftDelete(release) {
        if (!release.draft) {
            throw `"${release.html_url}" is not a draft release`
        }
        const res = await fetch(release.url, {
            method: "DELETE",
            headers: {
                "authorization": `token ${document.getElementById("token").value.trim()}`
            }
        })
        return `${res.status} ${res.statusText}`
    }
    const start = document.getElementById("start")
    start.addEventListener('click', handleSubmit)
    start.hidden = false
    console.log("Ready")
    </script>
</body>
</html>
