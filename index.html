<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub release draft deleter</title>
<style>
body, #container {
    width: 100vw;
    height: 100vh;
    margin: 0;
    padding: 0;

    display: flex;
    align-items: center;
    flex-direction: column;
}
#container {
    display: flex;
    align-items: center;
    flex-direction: column;
    justify-content: space-around;
    max-width: min(80vw, 600px);
}

#inner-container {
    display: flex;
    align-items: center;
    flex-direction: column;
}
#params-form {
    display: contents;
}

input, button {
    width: min(60vw, 500px);
    border: 1px grey solid;
    border-radius: 10px;
    padding: 10px;
    margin: 5px;
    box-sizing: border-box;
}

button:hover {
    background-color: gray;
    color: white;
}
p {
    text-align: justify;
}

h1 {
    text-align: center;
}

#log {
    overflow-y: scroll;
    width: 100vw;
}

::-webkit-input-placeholer, :-moz-placeholder, input {
    text-align: center;
}


</style>
</head>
<body>
    <div id="container">
        <h1>GitHub release draft deleter</h1>
        <div>
            <p>If you are lazy like me you can use query strings to pre-fill the elements like user, repo and token.</p>
            <p>All the data is processed locally. The only communication is with GitHub API.</p>
        </div>
        <!-- <h1>Token</h1> -->
        <div id="inner-container">
            <input id="token" placeholder="Token" type="password" autocomplete="new-password" />
            <form id="params-form">
                <!-- <h1>User</h1> -->
                <input id="user" placeholder="User" type="text" />
                <!-- <h1>Repository</h1> -->
                <input id="repo" placeholder="Repository" type="text" />
                <button type="submit">Start</button>
            </form>
        </div>
        <div id="log"></div>
    </div>
    <script>
    /**
     * Centralizes error reporting and handles unexpected errors.
     * All catch blocks and unhandled rejections MUST funnel through this function.
     *
     * @param {Error|any} error - The error to report.
     * @param {string} [context] - Optional contextual information.
     */
    function reportError(error, context = '') {
        const message = error instanceof Error ? error.message : String(error);
        const stack = error instanceof Error ? error.stack : 'No stack trace available';

        console.error(`[Error] ${context ? context + ': ' : ''}${message}`);
        console.error(stack);
    }

    // Global error handlers to prevent silent failures
    window.addEventListener('error', (event) => {
        reportError(event.error || event.message, 'Uncaught Error');
    });

    window.addEventListener('unhandledrejection', (event) => {
        reportError(event.reason, 'Unhandled Promise Rejection');
    });

    class GitHubClient {
        constructor(token, user, repo) {
            if (!token) throw new Error("Token not specified");
            if (!user) throw new Error("User not specified");
            if (!repo) throw new Error("Repository not specified");

            this.token = token;
            this.user = user;
            this.repo = repo;
            this.baseUrl = `https://api.github.com/repos/${this.user}/${this.repo}`;
        }

        async listReleases() {
            const perPage = 100;
            let page = 1;
            const all = [];

            while (true) {
                const url = `${this.baseUrl}/releases?per_page=${perPage}&page=${page}`;
                const response = await fetch(url, {
                    headers: {
                        "accept": "application/vnd.github.v3+json",
                        "authorization": `token ${this.token}`
                    }
                });

                if (!response.ok) {
                    let msg = `${response.status} ${response.statusText}`;
                    try {
                        const err = await response.json();
                        if (err && err.message) {
                            msg += ` - ${err.message}`;
                        }
                    } catch (err) {
                        reportError(err, 'Failed to parse JSON error response for listReleases');
                    }
                    throw new Error(msg);
                }

                const items = await response.json();
                all.push(...items);
                if (items.length < perPage) {
                    break;
                }
                page++;
            }
            return all;
        }

        async deleteDraft(release) {
            if (!release.draft) {
                throw new Error(`"${release.html_url}" is not a draft release`);
            }

            const response = await fetch(release.url, {
                method: "DELETE",
                headers: {
                    "authorization": `token ${this.token}`
                }
            });

            if (!response.ok) {
                let msg = `${response.status} ${response.statusText}`;
                try {
                    const err = await response.json();
                    if (err && err.message) msg += ` - ${err.message}`;
                } catch (err) {
                    reportError(err, 'Failed to parse JSON error response for handleDraftDelete');
                }
                throw new Error(msg);
            }
            return "deleted";
        }
    }

    (function() {
        try {
            let url = new URL(window.location.href)
            document.getElementById("token").value = url.searchParams.get("token") || ''
            document.getElementById("user").value = url.searchParams.get("user") || ''
            document.getElementById("repo").value = url.searchParams.get("repo") || ''
        } catch (err) {
            reportError(err, 'Failed to initialize form from URL');
        }
    })()

    function logPromise(promise, description) {
        const statusMsg = document.createElement("p")
        document.getElementById("log").appendChild(statusMsg)
        statusMsg.textContent = `WIP: ${description}`
        promise
        .then((msg) => {
            statusMsg.textContent = `${description} - OK ${msg}`
        })
        .catch((err) => {
            reportError(err, `Promise failed for: ${description}`)
            statusMsg.textContent = `${description} - ERR ${err.message || err}`
        })
    }
    async function handleSubmit(e) {
        e.preventDefault()
        const logEl = document.getElementById("log")
        try {
            const token = document.getElementById("token").value.trim()
            const user = document.getElementById("user").value.trim()
            const repo = document.getElementById("repo").value.trim()

            const client = new GitHubClient(token, user, repo)

            const releases = await client.listReleases()
            const drafts = releases.filter((v) => v.draft)
            console.log(drafts)
            if (drafts.length === 0) {
                const p = document.createElement("p")
                p.textContent = "No draft releases found."
                logEl.appendChild(p)
                return
            }
            drafts.forEach((draft) => {
                logPromise(client.deleteDraft(draft), `Delete '${draft.name || draft.tag_name}' (${draft.html_url})`)
            })
        } catch (err) {
            reportError(err, 'Failed to handle form submission')
            const p = document.createElement("p")
            p.textContent = `Error: ${err.message || err}`
            logEl.appendChild(p)
        }
    }

    document.getElementById("params-form").addEventListener('submit', handleSubmit)
    console.log("Ready")
    </script>
</body>
</html>
