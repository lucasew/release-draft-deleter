[tools]
node = "20.11.1"
"npm:workspaced" = "0.1.0"

[env]
npm_config_ignore_scripts = "true"
PATH = "{{config_root}}/.mise/bin:{{env.PATH}}"

[tasks.lint]
run = "workspaced codebase lint"

[tasks.fmt]
run = "workspaced codebase format"

[tasks.test]
depends = ["test:*"]

[tasks.codegen]
depends = ["codegen:*"]

[tasks.install]
depends = ["install:*"]

[tasks.ci]
depends = ["lint", "test"]

[tasks."test:echo"]
run = "echo 'No tests defined yet'"

[tasks."codegen:echo"]
run = "echo 'No codegen defined yet'"

[tasks."install:smart"]
run = '''
if [ -f package-lock.json ]; then
    npm ci
elif [ -f pnpm-lock.yaml ]; then
    pnpm install
elif [ -f yarn.lock ]; then
    yarn install
else
    echo "No package manager detected"
fi
'''
